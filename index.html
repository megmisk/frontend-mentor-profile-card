<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>social-card</title>
  </head>
  <body>
    <div class="container">
      <article class="card">
        <header class="card__header">
          <img class="card__image" src="/images/profile-pic.jpg" alt="Megan Miskiman profile picture">
          <h1 class="card__name">Megan Miskiman</h1>
          <p class="card__location">Vancouver, British Columbia</p>
          <p class="card__title">Frontend Developer</p>
        </header>
        <div class="card__body">
          <ul class="card__list">
            <li>
              <a href="https://github.com/megmisk" class="card__link rounded" target="_blank">
                GitHub
              </a>
            </li>
            <li>
              <a href="https://www.linkedin.com/in/meganmiskiman/" class="card__link rounded" target="_blank">
                LinkedIn
              </a>
            </li>
            <li>
              <button id="email-button" class="card__link card__link--primary rounded">Email</button>
            </li>
          </ul>
        </div>
      </article>
      <div id="alert-success" class="alert alert-success" role="alert">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.5 8.5 12 14 3.5 8.5m0 7.5L7 14m13.5 2L17 14m6.5 4a1.5 1.5 0 0 1-1.5 1.5H2A1.5 1.5 0 0 1 .5 18V6A1.5 1.5 0 0 1 2 4.5h20A1.5 1.5 0 0 1 23.5 6z" stroke="#cde667" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>Email copied to clipboard!</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
